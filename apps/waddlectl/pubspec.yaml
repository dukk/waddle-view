name: waddlectl
description: Operator CLI for Waddle View (SQLite + secrets).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  waddle_display:
    path: ../waddle_display
  drift: ^2.33.0
  args: ^2.5.0
  path: ^1.9.1
  meta: ^1.17.0

dependency_overrides:
  # Same as waddle_display: media_kit_video → wakelock_plus → dbus → xml ^6 vs webfeed.
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

executables:
  waddlectl: waddlectl
