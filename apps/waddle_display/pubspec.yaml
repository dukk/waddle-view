name: waddle_display
description: Waddle Display TV dashboard
publish_to: "none"
version: 1.0.0+1
resolution: workspace
repository: https://github.com/dukk/waddle-view
homepage: https://github.com/dukk/waddle-view
documentation: https://github.com/dukk/waddle-view/README.md
company: dukk
author_email: dukk@dukk.org
author_url: https://dukk.org
license: ONC
license_url: https://github.com/dukk/waddle-view/LICENSE

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  waddle_shared:
    path: ../../packages/waddle_shared
  meta: ^1.17.0
  cupertino_icons: ^1.0.8
  drift: ^2.33.0
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlite3: ^3.3.1
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.1.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  qr_flutter: ^4.1.0
  crypto: ^3.0.6
  window_manager: ^0.5.1
  http: ^1.2.2
  webfeed: ^0.7.0
  flutter_dotenv: ^6.0.1
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  url_launcher: ^6.3.2
  timezone: ^0.11.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
