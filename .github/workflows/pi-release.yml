name: Pi release bundle

on:
  push:
    tags: ['v*']
  workflow_dispatch:

defaults:
  run:
    working-directory: apps/waddle_view

jobs:
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package dist
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DIST="waddle-view-linux-arm64-${VERSION}"
          mkdir -p "../../dist/${DIST}"
          cp -r build/linux/arm64/release/bundle "../../dist/${DIST}/"
          cp -r ../../deploy/linux-arm64/* "../../dist/${DIST}/" 2>/dev/null || true
          cd ../../dist && tar czf "${DIST}.tar.gz" "${DIST}"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-bundle
          path: dist/*.tar.gz
