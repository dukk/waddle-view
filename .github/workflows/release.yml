# Builds Windows, Linux x64, and Pi (Linux arm64) bundles; publishes a GitHub Release on v* tags.
# Reusable jobs: release-windows.yml, release-linux-x64.yml, release-pi.yml.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    uses: ./.github/workflows/release-windows.yml
    with:
      build_number: ${{ github.run_number }}

  linux:
    uses: ./.github/workflows/release-linux-x64.yml
    with:
      build_number: ${{ github.run_number }}

  pi:
    uses: ./.github/workflows/release-pi.yml
    with:
      build_number: ${{ github.run_number }}

  publish:
    needs: [windows, linux, pi]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: windows-x64-bundle-${{ github.run_number }}
          path: release-assets
      - uses: actions/download-artifact@v6
        with:
          name: linux-x64-bundle-${{ github.run_number }}
          path: release-assets
      - uses: actions/download-artifact@v6
        with:
          name: linux-arm64-bundle-${{ github.run_number }}
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/*.tar.gz
