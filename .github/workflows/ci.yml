name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - 'apps/waddle_display/**'
      - 'apps/waddle_display_mock_api/**'
      - 'apps/waddle_controller/**'
      - 'apps/waddlectl/**'
      - 'packages/waddle_shared/**'
      - 'packages/waddle_data_providers/**'
      - 'pubspec.yaml'
      - 'deploy/**'
      - 'docs/pi/**'
      - '.github/workflows/**'

defaults:
  run:
    working-directory: apps/waddle_display

permissions:
  contents: read

jobs:
  validate-linux-build-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Linux build dependency list is complete
        run: |
          DEPS_FILE="$GITHUB_WORKSPACE/deploy/linux-arm64/build-deps.txt"
          test -f "$DEPS_FILE"
          for dep in clang lld-14 cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev libmpv-dev; do
            grep -qx "$dep" "$DEPS_FILE"
          done
      - name: Ensure release workflows install Linux deps from shared list
        run: |
          for wf in release-pi release-linux-x64; do
            f="$GITHUB_WORKSPACE/.github/workflows/${wf}.yml"
            test -f "$f"
            grep -q 'LINUX_BUILD_DEPS_FILE' "$f"
            # release-linux-x64: plain env path; release-pi (container): workspace-prefixed path
            grep -qE 'xargs -a "(\$GITHUB_WORKSPACE/)?\$LINUX_BUILD_DEPS_FILE"' "$f"
          done
      - name: Run deploy helper unit tests (pi-remote-upgrade)
        working-directory: ${{ github.workspace }}
        run: python3 -m unittest discover -s deploy -p 'test_*.py' -v
      - name: Validate install-latest-release.sh (bash syntax)
        run: bash -n "$GITHUB_WORKSPACE/deploy/install-latest-release.sh"
      - name: Validate linux-arm64 install.sh (bash syntax)
        run: bash -n "$GITHUB_WORKSPACE/deploy/linux-arm64/install.sh"

  analyze-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: validate-linux-build-deps
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: ${{ github.workspace }}
      - run: dart run build_runner build --delete-conflicting-outputs
        working-directory: ${{ github.workspace }}/packages/waddle_shared
      - run: flutter test
        working-directory: ${{ github.workspace }}/packages/waddle_shared
      - run: dart test
        working-directory: ${{ github.workspace }}/packages/waddle_data_providers
      - run: flutter analyze
      - run: flutter test --coverage --timeout=60s
      - name: Line coverage (lib/)
        run: dart run tool/coverage_check.dart --min=85 --target=90 coverage/lcov.info
      - run: flutter test
        working-directory: ${{ github.workspace }}/apps/waddlectl

  # Release-mode compile checks; run only after flutter analyze + tests pass (analyze-test).
  build-linux-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: analyze-test
    permissions:
      actions: write
      contents: read
    env:
      LINUX_BUILD_DEPS_FILE: ${{ github.workspace }}/deploy/linux-arm64/build-deps.txt
    defaults:
      run:
        working-directory: apps/waddle_display
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          xargs -a "$LINUX_BUILD_DEPS_FILE" sudo apt-get install -y
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
        working-directory: ${{ github.workspace }}
      - run: dart run build_runner build --delete-conflicting-outputs
        working-directory: ${{ github.workspace }}/packages/waddle_shared
      - run: flutter build linux --release --build-number "${{ github.run_number }}"
      - name: Build waddlectl CLI
        working-directory: ${{ github.workspace }}/apps/waddlectl
        run: dart build cli -o build/waddlectl_release
      - name: Merge waddlectl into Linux bundle
        working-directory: ${{ github.workspace }}/apps/waddle_display
        run: |
          src="${{ github.workspace }}/apps/waddlectl/build/waddlectl_release/bundle"
          dst="build/linux/x64/release/bundle/waddlectl"
          test -f "$src/bin/waddlectl"
          chmod +x "$src/bin/waddlectl"
          rm -rf "$dst"
          cp -a "$src" "$dst"
      - name: Audit Linux runtime dependencies
        run: |
          APP_BIN="build/linux/x64/release/bundle/waddle_display"
          WCTL_BIN="build/linux/x64/release/bundle/waddlectl/bin/waddlectl"
          test -x "$APP_BIN"
          test -x "$WCTL_BIN"
          ldd "$APP_BIN" | tee /tmp/waddle-ldd.txt
          if grep -q "not found" /tmp/waddle-ldd.txt; then
            echo "Missing runtime shared libraries detected."
            exit 1
          fi
          ldd "$WCTL_BIN" | tee /tmp/waddlectl-ldd.txt
          if grep -q "not found" /tmp/waddlectl-ldd.txt; then
            echo "Missing runtime shared libraries detected (waddlectl)."
            exit 1
          fi
      - name: Package CI dist (Linux x64)
        working-directory: ${{ github.workspace }}/apps/waddle_display
        run: |
          DIST="waddle-view-linux-x64-ci-run-${{ github.run_id }}-att-${{ github.run_attempt }}"
          mkdir -p "../../dist/${DIST}"
          cp -r build/linux/x64/release/bundle "../../dist/${DIST}/"
          cp ../../deploy/linux-arm64/install.sh ../../deploy/linux-arm64/waddle-view.service "../../dist/${DIST}/"
          cd ../../dist && tar czf "${DIST}.tar.gz" "${DIST}"
      - uses: actions/upload-artifact@v4
        with:
          name: ci-bundle-linux-x64-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/dist/*.tar.gz

  build-windows-release:
    runs-on: windows-latest
    timeout-minutes: 25
    needs: analyze-test
    permissions:
      actions: write
      contents: read
    defaults:
      run:
        working-directory: apps/waddle_display
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: ${{ github.workspace }}
      - run: dart run build_runner build --delete-conflicting-outputs
        working-directory: ${{ github.workspace }}/packages/waddle_shared
      - run: flutter build windows --release --build-number "${{ github.run_number }}"
      - name: Build waddlectl CLI
        working-directory: ${{ github.workspace }}/apps/waddlectl
        run: dart build cli -o build/waddlectl_release
      - name: Merge waddlectl into Windows Release bundle
        shell: pwsh
        working-directory: ${{ github.workspace }}/apps/waddle_display
        run: |
          $releaseDir = "build/windows/x64/runner/Release"
          $src = "${{ github.workspace }}/apps/waddlectl/build/waddlectl_release/bundle"
          if (-not (Test-Path "$src/bin/waddlectl.exe")) { throw "Missing $src/bin/waddlectl.exe" }
          $dst = Join-Path $releaseDir "waddlectl"
          if (Test-Path $dst) { Remove-Item -Recurse -Force $dst }
          New-Item -ItemType Directory -Force $dst | Out-Null
          Copy-Item -Path (Join-Path $src "*") -Destination $dst -Recurse
      - name: Verify Release output
        shell: pwsh
        run: |
          $exe = "build/windows/x64/runner/Release/waddle_display.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          $wctl = "build/windows/x64/runner/Release/waddlectl/bin/waddlectl.exe"
          if (-not (Test-Path $wctl)) { throw "Missing $wctl" }
      - name: Package CI dist (Windows x64)
        shell: pwsh
        working-directory: ${{ github.workspace }}/apps/waddle_display
        run: |
          $distName = "waddle-view-windows-x64-ci-run-${{ github.run_id }}-att-${{ github.run_attempt }}"
          $releaseDir = "build/windows/x64/runner/Release"
          New-Item -ItemType Directory -Force "../../dist" | Out-Null
          $zip = "../../dist/$distName.zip"
          Compress-Archive -Path "$releaseDir/*" -DestinationPath $zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ci-bundle-windows-x64-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/dist/*.zip

  waddle-controller:
    runs-on: ubuntu-latest
    needs: validate-linux-build-deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/waddle_controller/package-lock.json
      - name: npm ci + build + lint (waddle_controller)
        working-directory: apps/waddle_controller
        run: npm ci && npm run build && npm run lint

  waddle-display-mock-api:
    runs-on: ubuntu-latest
    needs: validate-linux-build-deps
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/waddle_display_mock_api/package-lock.json
      - name: npm ci + build + lint (waddle_display_mock_api)
        working-directory: apps/waddle_display_mock_api
        run: npm ci && npm run build && npm run lint

  build-pi:
    needs: analyze-test
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/release-pi.yml
    with:
      build_number: ${{ github.run_number }}
      dist_basename: waddle-view-linux-arm64-ci-run-${{ github.run_id }}-att-${{ github.run_attempt }}
      artifact_name: ci-bundle-linux-arm64-${{ github.run_id }}-${{ github.run_attempt }}

  cleanup-ci-bundle-artifacts:
    runs-on: ubuntu-latest
    needs:
      - analyze-test
      - waddle-controller
      - waddle-display-mock-api
      - build-linux-release
      - build-windows-release
      - build-pi
    if: always() && !cancelled()
    permissions:
      actions: write
      contents: read
    steps:
      - name: Prune old CI bundle artifacts (keep newest 5 per platform)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import json, os, subprocess, sys

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ.get("GH_TOKEN", "")
          if not token:
              print("No GH_TOKEN; skipping cleanup")
              sys.exit(0)

          prefixes = (
              "ci-bundle-linux-arm64-",
              "ci-bundle-linux-x64-",
              "ci-bundle-windows-x64-",
          )
          keep = 5

          def list_artifacts():
              page = 1
              out = []
              while True:
                  raw = subprocess.check_output(
                      [
                          "gh",
                          "api",
                          f"/repos/{repo}/actions/artifacts?per_page=100&page={page}",
                      ],
                      text=True,
                  )
                  data = json.loads(raw)
                  batch = data.get("artifacts") or []
                  out.extend(batch)
                  if len(batch) < 100:
                      break
                  page += 1
              return out

          def delete_artifact(aid: int):
              subprocess.check_call(
                  [
                      "gh",
                      "api",
                      "--method",
                      "DELETE",
                      f"/repos/{repo}/actions/artifacts/{aid}",
                  ],
              )

          try:
              all_arts = list_artifacts()
          except subprocess.CalledProcessError as e:
              print("Artifact list failed (non-fatal):", e)
              sys.exit(0)

          for prefix in prefixes:
              matching = [a for a in all_arts if a.get("name", "").startswith(prefix)]
              matching.sort(key=lambda a: a.get("created_at") or "", reverse=True)
              for a in matching[keep:]:
                  aid = a.get("id")
                  if aid is None:
                      continue
                  print("Deleting artifact", aid, a.get("name"))
                  try:
                      delete_artifact(int(aid))
                  except subprocess.CalledProcessError as e:
                      print("Delete failed:", e)
          PY
