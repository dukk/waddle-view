name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - 'apps/waddle_view/**'
      - 'deploy/**'
      - 'docs/pi/**'
      - '.github/workflows/**'

defaults:
  run:
    working-directory: apps/waddle_view

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build
      - run: flutter analyze
      - run: flutter test --coverage --timeout=60s
      - name: Line coverage (lib/)
        run: dart run tool/coverage_check.dart --min=90 coverage/lcov.info
