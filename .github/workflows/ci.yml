name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - 'apps/waddle_display/**'
      - 'deploy/**'
      - 'docs/pi/**'
      - '.github/workflows/**'

defaults:
  run:
    working-directory: apps/waddle_display

jobs:
  validate-linux-build-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Linux build dependency list is complete
        run: |
          DEPS_FILE="$GITHUB_WORKSPACE/deploy/linux-arm64/build-deps.txt"
          test -f "$DEPS_FILE"
          for dep in clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev; do
            grep -qx "$dep" "$DEPS_FILE"
          done
      - name: Ensure release workflow installs from shared list
        run: |
          rg -n "LINUX_BUILD_DEPS_FILE|xargs -a \"\\$LINUX_BUILD_DEPS_FILE\"" "$GITHUB_WORKSPACE/.github/workflows/pi-release.yml"

  analyze-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: validate-linux-build-deps
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build
      - run: flutter analyze
      - run: flutter test --coverage --timeout=60s
      - name: Line coverage (lib/)
        run: dart run tool/coverage_check.dart --min=90 coverage/lcov.info
