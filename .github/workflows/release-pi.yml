name: Release build — Pi Linux arm64

on:
  workflow_call:
    inputs:
      build_number:
        type: string
        required: true
      # CI: unique tarball base (e.g. waddle-view-linux-arm64-ci-run-…). Empty = release layout using GITHUB_REF_NAME.
      dist_basename:
        type: string
        required: false
        default: ''
      # CI: actions/upload-artifact name. Empty = linux-arm64-bundle-<build_number> (release).
      artifact_name:
        type: string
        required: false
        default: ''

defaults:
  run:
    working-directory: apps/waddle_display

jobs:
  # Host: ubuntu-22.04-arm (avoids GLIBC_2.38+ from newer Ubuntu images). Build runs inside
  # debian:bookworm-slim so shared-library SONAMEs match Raspberry Pi OS Bookworm (e.g.
  # libmpv.so.2 from libmpv2). Building on Ubuntu 22.04 arm64 linked libmpv.so.1, which
  # Bookworm does not provide.
  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    container:
      image: debian:bookworm-slim
    env:
      # Paths must resolve inside the job container: ${{ github.workspace }} stays on the
      # runner host (/home/runner/...) while builds run under $GITHUB_WORKSPACE (/__w/...).
      LINUX_BUILD_DEPS_FILE: deploy/linux-arm64/build-deps.txt
    steps:
      # Before checkout, apps/waddle_display does not exist — override workflow default cwd.
      - name: Install tools for checkout and Flutter (container has no git by default)
        working-directory: .
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            binutils ca-certificates curl file git gzip sudo unzip xz-utils zip
      - uses: actions/checkout@v4
      - name: Trust workspace for Git (Flutter / pub)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install Flutter SDK (arm64)
        run: |
          git clone --depth 1 --branch 3.41.9 https://github.com/flutter/flutter.git "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
      - name: Show Flutter version
        run: flutter --version
      - name: Validate Linux dependency baseline
        run: |
          deps="$GITHUB_WORKSPACE/$LINUX_BUILD_DEPS_FILE"
          test -f "$deps"
          for dep in clang lld-14 cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev libmpv-dev; do
            grep -qx "$dep" "$deps"
          done
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          xargs -a "$GITHUB_WORKSPACE/$LINUX_BUILD_DEPS_FILE" sudo apt-get install -y
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
        working-directory: .
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: packages/waddle_shared
      - run: flutter build linux --release --build-number "${{ inputs.build_number }}"
      - name: Build waddlectl CLI
        working-directory: apps/waddlectl
        run: dart build cli -o build/waddlectl_release
      - name: Merge waddlectl into Linux bundle
        working-directory: apps/waddle_display
        run: |
          src="$GITHUB_WORKSPACE/apps/waddlectl/build/waddlectl_release/bundle"
          dst="build/linux/arm64/release/bundle/waddlectl"
          test -f "$src/bin/waddlectl"
          chmod +x "$src/bin/waddlectl"
          rm -rf "$dst"
          cp -a "$src" "$dst"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/waddle_controller/package-lock.json
      - name: Lint, test, coverage, and build waddle_controller SPA
        working-directory: ${{ github.workspace }}/apps/waddle_controller
        run: npm ci && npm run lint && npm run test:coverage && npm run coverage:check && npm run build
      - name: Merge waddle_controller into Linux bundle
        working-directory: apps/waddle_display
        run: |
          src="$GITHUB_WORKSPACE/apps/waddle_controller/dist"
          dst="build/linux/arm64/release/bundle/waddle_controller"
          test -f "$src/index.html"
          rm -rf "$dst"
          mkdir -p "$dst"
          cp -a "$src"/. "$dst/"
      - name: Audit Linux runtime dependencies
        run: |
          APP_BIN="build/linux/arm64/release/bundle/waddle_display"
          WCTL_BIN="build/linux/arm64/release/bundle/waddlectl/bin/waddlectl"
          CTRL_IDX="build/linux/arm64/release/bundle/waddle_controller/index.html"
          test -x "$APP_BIN"
          test -x "$WCTL_BIN"
          test -f "$CTRL_IDX"
          ldd "$APP_BIN" | tee /tmp/waddle-ldd.txt
          if grep -q "not found" /tmp/waddle-ldd.txt; then
            echo "Missing runtime shared libraries detected."
            exit 1
          fi
          ldd "$WCTL_BIN" | tee /tmp/waddlectl-ldd.txt
          if grep -q "not found" /tmp/waddlectl-ldd.txt; then
            echo "Missing runtime shared libraries detected (waddlectl)."
            exit 1
          fi
          if ! grep -q 'libmpv\.so\.2' /tmp/waddle-ldd.txt; then
            echo "Expected waddle_display to link libmpv.so.2 (Debian Bookworm / Raspberry Pi OS)."
            grep -E 'mpv|not found' /tmp/waddle-ldd.txt || true
            exit 1
          fi
      - name: Assert Raspberry Pi OS Bookworm glibc baseline (libc6 2.36)
        run: |
          assert_glibc_max() {
            local bin="$1"
            local label="$2"
            local MAX
            MAX="$(objdump -T "$bin" | grep -oE 'GLIBC_[0-9.]+' | sed 's/^GLIBC_//' | sort -Vu | tail -1)"
            if [[ -z "$MAX" ]]; then
              echo "Could not parse GLIBC_* symbol versions from $bin ($label)"
              exit 1
            fi
            echo "Highest GLIBC symbol version referenced ($label): $MAX"
            if [[ "$(printf '%s\n%s\n' "$MAX" "2.36" | sort -V | tail -1)" != "2.36" ]]; then
              echo "Binary requires glibc newer than Raspberry Pi OS Bookworm (2.36). Adjust release-pi.yml (host + container) per comments there."
              exit 1
            fi
          }
          assert_glibc_max "build/linux/arm64/release/bundle/waddle_display" "waddle_display"
          assert_glibc_max "build/linux/arm64/release/bundle/waddlectl/bin/waddlectl" "waddlectl"
      - name: Package dist
        run: |
          if [[ -n '${{ inputs.dist_basename }}' ]]; then
            DIST='${{ inputs.dist_basename }}'
          else
            VERSION="${GITHUB_REF_NAME}"
            DIST="waddle-view-linux-arm64-${VERSION}"
          fi
          mkdir -p "../../dist/${DIST}"
          cp -r build/linux/arm64/release/bundle "../../dist/${DIST}/"
          cp -r ../../deploy/linux-arm64/* "../../dist/${DIST}/" 2>/dev/null || true
          cd ../../dist && tar czf "${DIST}.tar.gz" "${DIST}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name || format('linux-arm64-bundle-{0}', inputs.build_number) }}
          path: dist/*.tar.gz
